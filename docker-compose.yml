version: '3.8'

services:
  db:
    image: docker.io/library/postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=pharma_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pharma_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      bash -c "echo '⏳ Waiting for DB...' &&
               while ! nc -z db 5432; do sleep 1; done;
               echo '✅ DB is up, migrating...' &&
               python manage.py migrate &&
               python manage.py loaddata initial_data &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app:z
    environment:
      - DB_NAME=pharma_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-key-change-me-in-prod
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
